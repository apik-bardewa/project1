name: Deploy Website (Stable)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOST: ${{ secrets.SERVER_IP }}
      USER: ${{ secrets.SERVER_USER }}
      PASS: ${{ secrets.SERVER_PASSWORD }}
      PORT: "8013"
      SHA: ${{ github.sha }}

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Install Tools
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

      # =========================
      # Validate required files (IMPORTANT FIX)
      # =========================
      - name: Validate project files
        run: |
          echo "Checking required files..."

          test -f index.html || (echo "index.html missing" && exit 1)
          test -f design.css || (echo "design.css missing" && exit 1)
          test -f page1.js || (echo "page1.js missing" && exit 1)

          echo "All required files exist ✔"

      # =========================
      # Deploy Files (FIXED)
      # =========================
      - name: Deploy to Server
        run: |
          set -e

          RELEASE_DIR="release-${SHA:0:7}"

          echo "Creating release directory..."
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
            $USER@$HOST "mkdir -p /home/$USER/project1/releases/$RELEASE_DIR"

          echo "Uploading FULL project (IMPORTANT FIX)..."

          # FIX: upload EVERYTHING properly
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            $USER@$HOST:/home/$USER/project1/releases/$RELEASE_DIR/

          echo "Switching current release..."
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
            $USER@$HOST "
              ln -sfn /home/$USER/project1/releases/$RELEASE_DIR /home/$USER/project1/current
            "

      # =========================
      # Fix Permissions (IMPORTANT)
      # =========================
      - name: Fix server permissions
        run: |
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
          $USER@$HOST "
            chmod -R 755 /home/$USER/project1
          "

      # =========================
      # Verify Deployment (SMART CHECK)
      # =========================
      - name: Verify Deployment
        run: |
          echo "Waiting for server..."
          sleep 5

          URL="http://$HOST:$PORT"

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          echo "HTTP STATUS: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment failed"
            exit 1
          fi

          # Check JS + CSS directly (IMPORTANT FIX)
          CSS_STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL/design.css)
          JS_STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL/page1.js)

          echo "CSS STATUS: $CSS_STATUS"
          echo "JS STATUS: $JS_STATUS"

          if [ "$CSS_STATUS" != "200" ] || [ "$JS_STATUS" != "200" ]; then
            echo "❌ CSS or JS missing on server"
            exit 1
          fi

          echo "✅ Deployment Successful"
          echo "Live URL: $URL"