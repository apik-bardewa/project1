name: Deploy Static Website (Stable)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOST: ${{ secrets.SERVER_IP }}
      USER: ${{ secrets.SERVER_USER }}
      PASS: ${{ secrets.SERVER_PASSWORD }}
      PORT: "8013"
      SHA: ${{ github.sha }}

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Install tools
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

      # =========================
      # 3. Validate files BEFORE deploy
      # =========================
      - name: Validate project
        run: |
          echo "Checking required files..."

          test -f index.html || (echo "index.html missing" && exit 1)
          test -f design.css || (echo "design.css missing" && exit 1)
          test -f page1.js || (echo "page1.js missing" && exit 1)

          echo "All required files exist ✔"

      # =========================
      # 4. Test SSH connection first
      # =========================
      - name: Test SSH
        run: |
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
          $USER@$HOST "echo 'SSH OK'"

      # =========================
      # 5. Deploy FULL project
      # =========================
      - name: Deploy files
        run: |
          set -e

          RELEASE_DIR="release-${SHA:0:7}"

          echo "Creating release folder..."

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
            $USER@$HOST "mkdir -p /home/$USER/project1/releases/$RELEASE_DIR"

          echo "Uploading full project (FIXED)..."

          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            $USER@$HOST:/home/$USER/project1/releases/$RELEASE_DIR/

          echo "Switching current release..."

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
            $USER@$HOST "
              ln -sfn /home/$USER/project1/releases/$RELEASE_DIR /home/$USER/project1/current
            "

      # =========================
      # 6. Fix permissions
      # =========================
      - name: Fix permissions
        run: |
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no \
          $USER@$HOST "
            chmod -R 755 /home/$USER/project1
          "

      # =========================
      # 7. Verify deployment (VERY IMPORTANT)
      # =========================
      - name: Verify deployment
        run: |
          echo "Waiting for server..."
          sleep 5

          URL="http://$HOST:$PORT"

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)
          echo "Main page status: $STATUS"

          CSS=$(curl -o /dev/null -s -w "%{http_code}" $URL/design.css)
          JS=$(curl -o /dev/null -s -w "%{http_code}" $URL/page1.js)

          echo "CSS status: $CSS"
          echo "JS status: $JS"

          if [ "$STATUS" != "200" ] || [ "$CSS" != "200" ] || [ "$JS" != "200" ]; then
            echo "❌ Deployment failed (missing files or server issue)"
            exit 1
          fi

          echo "✅ Deployment successful"
          echo "Live URL: $URL"