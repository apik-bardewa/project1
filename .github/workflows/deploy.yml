name: Deploy Website

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOST: ${{ secrets.SERVER_IP }}
      USER: ${{ secrets.SERVER_USER }}
      PASS: ${{ secrets.SERVER_PASSWORD }}
      PORT: "8013"
      SHA: ${{ github.sha }}

    steps:
      # =========================
      # Checkout Repository
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # Install sshpass
      # =========================
      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync

      # =========================
      # Setup Apache Server
      # =========================
      - name: Configure Apache Server
        run: |
          set -e

          # Create Apache VirtualHost config
          cat > /tmp/project.conf <<EOF
          <VirtualHost *:$PORT>

              ServerAdmin webmaster@localhost

              DocumentRoot /home/$USER/project1/current

              <Directory /home/$USER/project1/current>
                  Options Indexes FollowSymLinks
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog \${APACHE_LOG_DIR}/project1-error.log
              CustomLog \${APACHE_LOG_DIR}/project1-access.log combined

          </VirtualHost>
          EOF

          # Upload config to server
          sshpass -p "$PASS" scp \
            -o StrictHostKeyChecking=no \
            /tmp/project.conf \
            $USER@$HOST:/tmp/project.conf

          # Configure server
          sshpass -p "$PASS" ssh \
            -o StrictHostKeyChecking=no \
            $USER@$HOST << EOF

              set -e

              # Install Apache if not installed
              if ! dpkg -s apache2 >/dev/null 2>&1; then
                sudo apt update -qq
                sudo apt install -y -qq apache2
              fi

              # Create deployment directories
              mkdir -p /home/$USER/project1/releases
              mkdir -p /home/$USER/project1/shared

              # Add Apache port if not exists
              if ! grep -q "^Listen $PORT$" /etc/apache2/ports.conf; then
                echo "$PASS" | sudo -S bash -c "echo 'Listen $PORT' >> /etc/apache2/ports.conf"
              fi

              # Move Apache config
              echo "$PASS" | sudo -S mv /tmp/project.conf /etc/apache2/sites-available/project1.conf

              # Enable site
              if [ ! -L /etc/apache2/sites-enabled/project1.conf ]; then
                echo "$PASS" | sudo -S a2ensite project1.conf
              fi

              # Enable rewrite module
              echo "$PASS" | sudo -S a2enmod rewrite

              # Permissions
              chmod 755 /home/$USER
              chmod -R 755 /home/$USER/project1

              # Test Apache config
              echo "$PASS" | sudo -S apache2ctl configtest

              # Restart Apache
              echo "$PASS" | sudo -S systemctl restart apache2

          EOF

      # =========================
      # Deploy Project
      # =========================
      - name: Deploy Website Files
        run: |
          set -e

          RELEASE_DIR="release-${SHA:0:7}"

          echo "Creating release directory..."

          sshpass -p "$PASS" ssh \
            -o StrictHostKeyChecking=no \
            $USER@$HOST "
              mkdir -p /home/$USER/project1/releases/$RELEASE_DIR
            "

          echo "Uploading files..."

          sshpass -p "$PASS" rsync -avz --delete \
            -e 'ssh -o StrictHostKeyChecking=no' \
            ./ \
            $USER@$HOST:/home/$USER/project1/releases/$RELEASE_DIR/

          echo "Switching current release..."

          sshpass -p "$PASS" ssh \
            -o StrictHostKeyChecking=no \
            $USER@$HOST "
              ln -sfn /home/$USER/project1/releases/$RELEASE_DIR /home/$USER/project1/current
            "

      # =========================
      # Verify Deployment
      # =========================
      - name: Verify Deployment
        run: |
          echo "Waiting for server..."
          sleep 5

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://$HOST:$PORT)

          echo "HTTP STATUS = $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Deployment Failed"
            exit 1
          fi

          echo "Deployment Successful"
          echo "Website URL: http://$HOST:$PORT"